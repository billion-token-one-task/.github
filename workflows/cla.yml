name: CLA Assistant
on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla-check:
    runs-on: ubuntu-latest
    steps:
      - name: CLA Assistant
        if: (github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA' || github.event_name == 'pull_request_target')
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PERSONAL_ACCESS_TOKEN: ${{ secrets.CLA_TOKEN }}
        with:
          path-to-signatures: 'signatures/cla.json'
          path-to-document: 'https://github.com/billion-token-one-task/.github/blob/main/CLA.md'
          branch: 'main'
          allowlist: 'bot*,dependabot*,github-actions*'
          custom-notsigned-prcomment: |
            感谢你的贡献！在我们合并之前，请阅读并签署我们的 [贡献者许可协议 (CLA)](https://github.com/billion-token-one-task/.github/blob/main/CLA.md)。

            Thank you for your contribution! Before we can merge, please read and sign our [Contributor License Agreement (CLA)](https://github.com/billion-token-one-task/.github/blob/main/CLA.md).

            ---
            **签署方式 / How to sign:** 请在本 PR 下评论以下内容 / Comment the following in this PR:

            `I have read the CLA Document and I hereby sign the CLA`
          custom-pr-sign-comment: 'I have read the CLA Document and I hereby sign the CLA'
          custom-allsigned-prcomment: |
            ✅ 所有贡献者已签署 CLA。All contributors have signed the CLA.
